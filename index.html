<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SCADA SAFE MODE</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #050a10;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

#top {
  height: 70px;
  background: #0f1722;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 22px;
  font-weight: bold;
}

#grid {
  height: calc(100% - 70px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
  box-sizing: border-box;
}

.tile {
  background: #0f1a27;
  border-radius: 10px;
  padding: 10px;
  border: 1px solid #1d2a3a;
  min-height: 120px;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

.status {
  font-size: 28px;
  margin-bottom: 10px;
}

.ok { color: #2ecc71; }
.warn { color: #f1c40f; }
.error { color: #e74c3c; }
.offline { color: #7f8c8d; }
</style>
</head>

<body>

<div id="top">🏭 ANDON SAFE MODE</div>
<div id="grid"></div>

<script>

const lines = [
  "Linia 2",
  "Linia 3",
  "Linia 4",
  "Linia 5",
  "Linia 6",
  "Linia 7",
  "Linia 8",
  "Linia 9",
  "Linia 10",
  "Linia 11",
  "Linia 12",
  "Linia 13"
];

function randomStatus() {
  const r = Math.random();
  if (r < 0.7) return ["OK", "ok"];
  if (r < 0.9) return ["UWAGA", "warn"];
  return ["ERROR", "error"];
}

/* NA START: FAKE DATA (żeby system NIGDY nie był pusty) */
function render() {
  const grid = document.getElementById("grid");

  grid.innerHTML = lines.map(l => {
    const [text, cls] = randomStatus();

    return `
      <div class="tile">
        <div class="title">${l}</div>
        <div class="status ${cls}">${text}</div>
        <div style="opacity:0.6">LIVE SIMULATION MODE</div>
      </div>
    `;
  }).join("");
}

render();
setInterval(render, 3000);

</script>

</body>
</html>
