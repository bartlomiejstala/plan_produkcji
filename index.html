<script>
const SHEET_ID = "1urmkGGMZUZD5ZUacIztgyn8LIggKFQIA216BX1gGh3k";

const gids = [
  "1302678005",
  "591301520",
  "754950235",
  "1526133636",
  "1371427007",
  "1371427007",
  "235755546",
  "1578466874",
  "1844684744",
  "627551025",
  "1597822855",
  "1089363128"
];

let index = 0;

function getUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
}

async function loadSheet(gid) {
  const res = await fetch(getUrl(gid));
  const text = await res.text();

  // Google zwraca JSON w wrapperze → trzeba go „odkleić”
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows.map(r =>
    r.c.map(c => (c ? c.v : ""))
  );
}

function render(data) {
  let html = "<table style='width:100%;color:white'>";

  data.forEach((row, i) => {
    html += "<tr>";
    row.forEach(cell => {
      if (i === 0) {
        html += `<th>${cell}</th>`;
      } else {
        let cls = "";

        if (String(cell).toLowerCase().includes("ok")) cls = "ok";
        if (String(cell).toLowerCase().includes("opóź")) cls = "error";
        if (String(cell).toLowerCase().includes("uwaga")) cls = "warn";

        html += `<td class="${cls}">${cell}</td>`;
      }
    });
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

async function update() {
  const gid = gids[index];

  const data = await loadSheet(gid);

  document.getElementById("panel").innerHTML =
    "<h2 style='color:white'>" + gid + "</h2>" + render(data);

  index = (index + 1) % gids.length;
}

setInterval(update, 30000);
update();
</script>
