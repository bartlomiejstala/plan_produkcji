<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan produkcji</title>

<!-- 🔥 FAVICON (LOGO W ZAKŁADCE) -->
<link rel="icon" type="image/png" href="logo.png">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* kontener */
#container {
  position: relative;
  width: 100%;
  height: 100%;
}

/* iframe (Google Sheets VIEW) */
iframe {
  position: absolute;

  /* 🔥 crop UI Google (ukrywa nagłówki A/B/C i 1/2/3) */
  top: -20px;
  left: -30px;
  width: calc(100% + 140px);
  height: calc(100% + 90px);

  border: none;
  background: #000;

  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}

/* aktywny iframe */
iframe.active {
  opacity: 1;
  z-index: 2;
}

/* nieaktywny iframe */
iframe.inactive {
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="container">
  <iframe id="frameA" class="active"></iframe>
  <iframe id="frameB" class="inactive"></iframe>
</div>

<script>

const baseUrl =
  "https://docs.google.com/spreadsheets/d/1urmkGGMZUZD5ZUacIztgyn8LIggKFQIA216BX1gGh3k/edit?rm=minimal";

const gids = [
  "1302678005", // 2
  "591301520",  // 3
  "754950235",  // 4
  "1526133636", // 5
  "1371427007", // 6
  "2052740737", // 7
  "235755546",  // 8
  "1578466874", // 9
  "1844684744", // 10
  "627551025",  // 11
  "1597822855", // 12
  "1089363128"  // 13
];

let index = 0;

const frameA = document.getElementById("frameA");
const frameB = document.getElementById("frameB");

let current = frameA;
let next = frameB;

/* 🔄 przełączanie widoków */
function switchView() {

  const gid = gids[index];

  next.classList.remove("active");
  next.classList.add("inactive");

  next.src = `${baseUrl}#gid=${gid}`;

  next.onload = () => {

    // fade in next
    next.classList.add("active");
    next.classList.remove("inactive");

    // fade out current
    current.classList.remove("active");
    current.classList.add("inactive");

    // swap
    [current, next] = [next, current];
  };

  index = (index + 1) % gids.length;
}

/* start */
switchView();

/* zmiana co 30 sekund */
setInterval(switchView, 30000);

</script>

</body>
</html>
