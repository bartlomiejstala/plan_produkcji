<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>DATA VIEW</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* kontener */
#container {
  position: relative;
  width: 100%;
  height: 100%;
}

/* iframe - czysty podgląd */
iframe {
  position: absolute;

  /* 🔥 „crop” UI Google Sheets */
  top: -45px;
  left: -70px;
  width: calc(100% + 140px);
  height: calc(100% + 90px);

  border: none;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  background: black;
}

/* aktywny */
iframe.active {
  opacity: 1;
  z-index: 2;
}

/* nieaktywny */
iframe.inactive {
  opacity: 0;
  z-index: 1;
}
</style>
</head>

<body>

<div id="container">
  <iframe id="frameA" class="active"></iframe>
  <iframe id="frameB" class="inactive"></iframe>
</div>

<script>

const baseUrl =
  "https://docs.google.com/spreadsheets/d/1urmkGGMZUZD5ZUacIztgyn8LIggKFQIA216BX1gGh3k/edit?rm=minimal";

const gids = [
  "1302678005",
  "591301520",
  "754950235",
  "1526133636",
  "1371427007",
  "2052740737",
  "235755546",
  "1578466874",
  "1844684744",
  "627551025",
  "1597822855",
  "1089363128"
];

let index = 0;

const frameA = document.getElementById("frameA");
const frameB = document.getElementById("frameB");

let current = frameA;
let next = frameB;

/* preload + switch */
function switchView() {

  const gid = gids[index];

  next.classList.remove("active");
  next.classList.add("inactive");

  next.src = `${baseUrl}#gid=${gid}`;

  next.onload = () => {

    // fade in
    next.classList.add("active");
    next.classList.remove("inactive");

    // fade out
    current.classList.remove("active");
    current.classList.add("inactive");

    // swap
    [current, next] = [next, current];
  };

  index = (index + 1) % gids.length;
}

/* start */
switchView();

/* rotate co 30s */
setInterval(switchView, 30000);

</script>

</body>
</html>
